name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  release:
    uses: kristjanjansen/mfe-infra/.github/workflows/release-preview.yml@main
    permissions:
      contents: read
      packages: write
    with:
      service_name: mfe-translations
      port: "4000"
      version: ${{ github.ref_name }}
    secrets:
      infra_token: ${{ secrets.INFRA_TOKEN }}
